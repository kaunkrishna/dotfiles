$WALLPAPER_PATH = /home/kaun/.config/background.png

# BACKGROUND
background {
    path = $WALLPAPER_PATH
    blur_size = 7
    blur_passes = 3
    ignore_opacity = true

    noise = 0.08
    contrast = 1.5
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# INPUT FIELD
input-field {
    size = 170, 45
    outline_thickness = 2
    rounding = 50

    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(0,0,0,0)
    inner_color = rgba(30,30,46,0.7)
    font_color = rgba(166,173,200,1)
    fail_color = rgba(243, 139, 168, 1)

    check_color = rgba(0,0,0,0)
    capslock_color = rgba(0,0,0,0)
    numlock_color = rgba(0,0,0,0)
    bothlock_color = rgba(0,0,0,0)

    fade_on_empty = false
    font_family = JetBrains Mono

    placeholder_text = <b>Enter Password</b>
    hide_input = false

    fail_text = <b>Wrong Password</b>
    fail_transition = 80

    position = 0, -70
    halign = center
    valign = center
}

# TIME
label {
    text = <span><b>$TIME12</b></span>
    color = rgba(245, 177, 229, 1)
    font_size = 85
    font_family = JetBrains Mono
    position = 0, 310
    halign = center
    valign = center
}

# USER
label {
    text = cmd[update:1000] echo "<b>${USER^^}</b>"
    color = rgba(205, 214, 244, 1)
    font_size = 20
    font_family = Adwaita Sans
    position = 0, -20
    halign = center
    valign = center
}

# CURRENT SONG (SPOTIFY)
label {
    text = cmd[update:1000] echo "<b>$(~/.config/hypr/scripts/spotify-playing.sh)</b>"
    color = rgba(30, 30, 46, 1)
    font_size = 14
    font_family = JetBrains Mono
    position = 0, 235
    halign = center
    valign = center
}
