<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matugen GTK Palette Preview</title>
    <style>
        body {
            background-color: #120d11;
            color: #ebdfe6;
            font-family: 'JetBrains Mono', 'Segoe UI', monospace;
            padding: 2rem;
            margin: 0;
        }
        h1 { border-bottom: 2px solid #4d444c; padding-bottom: 10px; margin-bottom: 30px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
        }
        .card {
            background: #1f1a1f;
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #4d444c;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-3px); border-color: #edb4ea; }
        .swatch {
            height: 80px;
            width: 100%;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .info { display: flex; flex-direction: column; }
        .name { font-size: 0.8rem; font-weight: bold; color: #edb4ea; }
        .hex { font-size: 0.7rem; opacity: 0.6; margin-top: 4px; }
    </style>
</head>
<body>

<h1>Matugen GTK Palette (@define-color)</h1>
<div class="grid" id="paletteGrid"></div>

<script>
    const rawData = `
    @define-color background #171216;
    @define-color error #ffb4ab;
    @define-color error_container #93000a;
    @define-color inverse_on_surface #352e34;
    @define-color inverse_primary #7d4e7d;
    @define-color inverse_surface #ebdfe6;
    @define-color on_background #ebdfe6;
    @define-color on_error #690005;
    @define-color on_error_container #ffdad6;
    @define-color on_primary #4a204c;
    @define-color on_primary_container #ffd6fa;
    @define-color on_primary_fixed #320936;
    @define-color on_primary_fixed_variant #633664;
    @define-color on_secondary #3c2b3b;
    @define-color on_secondary_container #f5dbf0;
    @define-color on_secondary_fixed #261625;
    @define-color on_secondary_fixed_variant #534152;
    @define-color on_surface #ebdfe6;
    @define-color on_surface_variant #d0c3cc;
    @define-color on_tertiary #4c261e;
    @define-color on_tertiary_container #ffdad3;
    @define-color on_tertiary_fixed #33110b;
    @define-color on_tertiary_fixed_variant #673b32;
    @define-color outline #998d96;
    @define-color outline_variant #4d444c;
    @define-color primary #edb4ea;
    @define-color primary_container #633664;
    @define-color primary_fixed #ffd6fa;
    @define-color primary_fixed_dim #edb4ea;
    @define-color scrim #000000;
    @define-color secondary #d8bfd4;
    @define-color secondary_container #534152;
    @define-color secondary_fixed #f5dbf0;
    @define-color secondary_fixed_dim #d8bfd4;
    @define-color shadow #000000;
    @define-color source_color #f4baf1;
    @define-color surface #171216;
    @define-color surface_bright #3e373c;
    @define-color surface_container #241e23;
    @define-color surface_container_high #2e282d;
    @define-color surface_container_highest #393338;
    @define-color surface_container_low #1f1a1f;
    @define-color surface_container_lowest #120d11;
    @define-color surface_dim #171216;
    @define-color surface_tint #edb4ea;
    @define-color surface_variant #4d444c;
    @define-color tertiary #f6b8ab;
    @define-color tertiary_container #673b32;
    @define-color tertiary_fixed #ffdad3;
    @define-color tertiary_fixed_dim #f6b8ab;`;

    const container = document.getElementById('paletteGrid');
    const lines = rawData.trim().split('\n');

    lines.forEach(line => {
        const parts = line.trim().split(' ');
        if (parts.length >= 3) {
            const name = parts[1];
            const hex = parts[2].replace(';', '');

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="swatch" style="background-color: ${hex}"></div>
                <div class="info">
                    <span class="name">${name}</span>
                    <span class="hex">${hex}</span>
                </div>
            `;
            container.appendChild(card);
        }
    });
</script>

</body>
</html>
